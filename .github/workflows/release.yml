name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update plugin.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' .claude-plugin/plugin.json > tmp.json \
            && mv tmp.json .claude-plugin/plugin.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: bump plugin version to ${{ steps.version.outputs.version }}"
          git push origin main
